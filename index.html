<!-- perceptive-world — 2D RPG demo (Famicom/SFC style)
     scenario: goblin ("ゴブリン討伐")  /  rules faithful-ish: 2D6+mod, crit=12, fumble=2 -->
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Perceptive World — RPG Demo</title>
<style>
  :root{
    --win:#182848; --winb:#f8f8f8; --wind:#3858a8;
    --txt:#ffffff; --sel:#ffe040; --dim:#a8b0d0;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;background:#000;overflow:hidden;
    font-family:'DotGothic16','Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif;}
  #wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;}
  #screen{position:relative;width:min(100vw, calc(100vh*8/7));height:min(100vh, calc(100vw*7/8));
    background:#000;overflow:hidden;box-shadow:0 0 0 3px #333, 0 0 40px #000;}
  canvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:pixelated;
    image-rendering:crisp-edges;}
  /* retro windows */
  .win{position:absolute;background:var(--win);border:3px solid var(--winb);
    border-radius:4px;color:var(--txt);padding:8px 10px;line-height:1.55;
    text-shadow:1px 1px 0 #000;box-shadow:0 0 0 2px #000 inset;
    font-size:clamp(10px,3.1vmin,17px);}
  .win .cap{color:var(--sel);}
  #dlg{left:4%;right:4%;bottom:3%;min-height:20%;display:none;}
  #dlg .name{color:var(--sel);font-weight:bold;margin-bottom:2px;}
  #dlg .adv{position:absolute;right:10px;bottom:6px;color:var(--sel);
    animation:blink 1s steps(2) infinite;font-size:0.8em;}
  #choices{position:absolute;right:4%;bottom:calc(3% + 22%);display:none;min-width:36%;}
  #choices .opt{padding:2px 6px 2px 20px;position:relative;cursor:pointer;}
  #choices .opt.on::before{content:'▶';position:absolute;left:4px;color:var(--sel);}
  /* battle */
  #bStatus{left:3%;bottom:3%;width:44%;display:none;font-size:clamp(9px,2.7vmin,15px);}
  #bStatus .bar{height:7px;background:#000;border:1px solid #6a7;margin:2px 0 5px;border-radius:2px;overflow:hidden;}
  #bStatus .bar i{display:block;height:100%;}
  #bMenu{right:3%;bottom:3%;width:44%;display:none;}
  #bMenu .opt{padding:2px 6px 2px 22px;position:relative;cursor:pointer;}
  #bMenu .opt.on::before{content:'▶';position:absolute;left:6px;color:var(--sel);}
  #bMenu .opt.dis{color:#6a7092;}
  #bMsg{left:3%;right:3%;bottom:3%;min-height:16%;display:none;}
  #bMsg .adv{position:absolute;right:10px;bottom:6px;color:var(--sel);animation:blink 1s steps(2) infinite;font-size:0.8em;}
  #prep{left:3%;top:3%;display:none;font-size:clamp(9px,2.6vmin,14px);padding:5px 9px;}
  #zoom{position:absolute;right:3%;top:3%;display:none;flex-direction:column;gap:4px;align-items:flex-end;z-index:6;}
  #zoom .zlvl{background:var(--win);border:3px solid var(--winb);border-radius:4px;color:#fff;
    padding:4px 9px;font-size:clamp(9px,2.5vmin,14px);text-shadow:1px 1px 0 #000;box-shadow:0 0 0 2px #000 inset;}
  #zoom .zb{background:#3858a8;border:2px solid #fff;border-radius:6px;color:#fff;cursor:pointer;
    padding:6px 10px;font-family:inherit;font-size:clamp(9px,2.5vmin,14px);text-shadow:1px 1px 0 #000;
    box-shadow:0 2px 0 #12244f;}
  #zoom .zb:active{transform:translateY(2px);box-shadow:none;}
  #zoom .zb:disabled{background:#33395a;color:#7078a0;border-color:#556;cursor:default;box-shadow:none;}

  /* ===== detail +1/+2 : classic FF-style blue command window ===== */
  #screen.hi .win, #screen.hi #zoom .zlvl{
    border:3px solid #eaf2ff;
    background:linear-gradient(180deg,#3a5edb 0%,#14238a 55%,#0d1a6e 100%);
    box-shadow:inset 0 0 0 2px #14239a, inset 0 0 0 4px #7aa0ff, 0 0 0 2px #0a1240, 0 2px 6px rgba(0,0,0,.5);
    border-radius:7px;
    color:#fff;
  }
  #screen.hi .win .cap, #screen.hi #zoom .zlvl .cap{color:#ffe8a0;}
  #screen.hi #zoom .zb{
    border:3px solid #eaf2ff;
    background:linear-gradient(180deg,#3a5edb,#14238a);
    box-shadow:inset 0 0 0 2px #7aa0ff, 0 3px 0 #0a1240;
    border-radius:7px;
  }
  #screen.hi #zoom .zb:active{transform:translateY(2px);box-shadow:inset 0 0 0 2px #7aa0ff;}
  #screen.hi #zoom .zb:disabled{background:#2a3560;color:#8a92c0;border-color:#8fa0d8;box-shadow:none;}
  /* dice */
  #dice{position:absolute;left:50%;top:30%;transform:translateX(-50%);display:none;gap:8px;z-index:5;}
  #dice.shake{animation:diceshake .1s infinite;}
  @keyframes diceshake{
    0%{transform:translateX(-50%) translateY(0) rotate(0)}
    30%{transform:translateX(-51%) translateY(-4px) rotate(-8deg)}
    60%{transform:translateX(-49%) translateY(3px) rotate(7deg)}
    100%{transform:translateX(-50%) translateY(0) rotate(0)}}
  .die{width:clamp(24px,7.5vmin,44px);aspect-ratio:1;background:#fff;border:2px solid #000;
    border-radius:6px;position:relative;box-shadow:0 3px 0 #888;}
  .die.roll{animation:diehop .12s infinite alternate;}
  @keyframes diehop{from{transform:translateY(0) rotate(-10deg)}to{transform:translateY(-3px) rotate(12deg)}}
  .die .p{position:absolute;width:18%;aspect-ratio:1;background:#000;border-radius:50%;}
  /* enemy HP labels */
  #foes{position:absolute;inset:0;display:none;pointer-events:none;z-index:4;}
  .foe{position:absolute;transform:translateX(-50%);text-align:center;width:26%;
    font-size:clamp(8px,2.4vmin,13px);color:#fff;text-shadow:1px 1px 0 #000;line-height:1.1;}
  .foe .fn{color:#ffcf6a;white-space:nowrap;}
  .foe .fbar{height:5px;background:#000;border:1px solid #b55;border-radius:2px;margin:1px auto;width:80%;overflow:hidden;}
  .foe .fbar i{display:block;height:100%;background:#e04040;}
  .foe .fhp{font-size:.82em;color:#eee;}
  /* title / end */
  .full{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;
    justify-content:center;color:#fff;text-align:center;background:rgba(0,0,10,.55);gap:10px;}
  .full h1{font-size:clamp(18px,7vmin,44px);margin:0;color:#ffe040;text-shadow:2px 2px 0 #000,0 0 12px #b60;}
  .full .sub{color:#cdd; font-size:clamp(10px,3vmin,16px);}
  .full .press{margin-top:14px;color:#ffe040;animation:blink 1.1s steps(2) infinite;font-size:clamp(11px,3.4vmin,18px);}
  @keyframes blink{50%{opacity:0}}
  /* touch controls */
  #pad{position:absolute;left:2%;bottom:2%;width:34vmin;height:34vmin;display:none;opacity:.75;touch-action:none;}
  #pad .k{position:absolute;background:#2a2f4a;border:2px solid #cfd;border-radius:8px;color:#cfd;
    display:flex;align-items:center;justify-content:center;font-size:5vmin;}
  #pad .up{left:34%;top:0;width:32%;height:34%;} #pad .dn{left:34%;bottom:0;width:32%;height:34%;}
  #pad .lf{left:0;top:34%;width:34%;height:32%;} #pad .rt{right:0;top:34%;width:34%;height:32%;}
  #btns{position:absolute;right:2%;bottom:2%;display:none;gap:3vmin;opacity:.8;touch-action:none;}
  #btns .b{width:14vmin;height:14vmin;border-radius:50%;background:#3858a8;border:3px solid #fff;
    color:#fff;font-size:5vmin;display:flex;align-items:center;justify-content:center;}
  #btns .b.b2{background:#a03028;}
</style>

<div id="wrap"><div id="screen">
  <canvas id="cv" width="256" height="224"></canvas>

  <div id="prep" class="win"><span id="prepLbl">じゅんび</span> <span id="prepN" class="cap">0/3</span></div>

  <div id="zoom">
    <div class="zlvl"><span id="zlvlLbl">しょうさいど</span> <span id="zlvlN" class="cap">0</span></div>
    <button id="zoomIn" class="zb">＋ ズームイン</button>
    <button id="zoomOut" class="zb">－ ズームアウト</button>
  </div>

  <div id="dlg" class="win"><div class="name" id="dName"></div><div id="dText"></div><span class="adv">▼</span></div>
  <div id="choices" class="win"></div>

  <div id="bStatus" class="win"></div>
  <div id="bMenu" class="win"></div>
  <div id="bMsg" class="win"><span id="bMsgT"></span><span class="adv">▼</span></div>
  <div id="foes"></div>
  <div id="dice"><div class="die" id="d1"></div><div class="die" id="d2"></div></div>

  <div id="title" class="full">
    <h1>PERCEPTIVE WORLD</h1>
    <div class="sub">— ゴブリン討伐 —</div>
    <div class="sub" style="font-size:.8em;opacity:.8">2D RPG demo</div>
    <div class="press">PRESS Z / TAP</div>
  </div>
  <div id="win" class="full"><h1>クリア！</h1><div class="sub" id="winSub"></div><div class="press">PRESS Z / TAP</div></div>
  <div id="over" class="full"><h1 style="color:#e55">ぜんめつ…</h1><div class="sub">村の広場で目を覚ました。</div><div class="press">PRESS Z でさいちょうせん</div></div>

  <div id="pad">
    <div class="k up" data-k="up">▲</div><div class="k dn" data-k="down">▼</div>
    <div class="k lf" data-k="left">◀</div><div class="k rt" data-k="right">▶</div>
  </div>
  <div id="btns"><div class="b b2" data-k="cancel">B</div><div class="b" data-k="ok">A</div></div>
</div></div>

function blit(name,dx,dy,dw,dh){ const s=SPR[name]; if(!s) return false;
  g.drawImage(ATLAS, s.x,s.y,s.w,s.h, Math.round(dx),Math.round(dy),Math.round(dw),Math.round(dh)); return true; }
function blitFlip(name,dx,dy,dw,dh){ const s=SPR[name]; if(!s) return;
  g.save(); g.translate(Math.round(dx)+Math.round(dw),Math.round(dy)); g.scale(-1,1);
  g.drawImage(ATLAS, s.x,s.y,s.w,s.h, 0,0, Math.round(dw),Math.round(dh)); g.restore(); }
function blitAnchor(name,dx,dy,s,wt,ht){ const sp=SPR[name]; if(!sp) return; const w=wt*s,h=ht*s;
  blit(name, dx-(w-s)/2, dy-(h-s), w, h); }
// tile char -> ground sprite / prop sprite
const GROUND={',':'grass','=':'dirt','w':'water','"':'flower','F':'ifloor','%':'iwall'};
const PROP={ 'T':['tree',1.25,1.55], 'O':['well',1.35,1.45], 'H':['shrine',1.35,1.35] };
function drawTileImg(t,dx,dy,s,tk,tx,ty){
  if(S.map.houseSet && S.map.houseSet.has(tx+','+ty)){ blit('grass',dx,dy,s,s); return; }
  const gname=GROUND[t]; if(gname){ blit(gname,dx,dy,s,s); return; }
  if(PROP[t]){ blit('grass',dx,dy,s,s); const p=PROP[t]; blitAnchor(p[0],dx,dy,s,p[1],p[2]); return; }
  if(t==='K'){ blit('grass',dx,dy,s,s); if(s===16) tower(dx,dy); return; }
  if(t==='G'){ blit('dirt',dx,dy,s,s); if(s===16) gate(dx,dy); return; }
  if(t==='i'){ if(s===16) cwall(dx,dy); else blit('grass',dx,dy,s,s); blitAnchor('torch',dx,dy,s,0.6,1.1); return; }
  if(t==='d'){ if(S.map.kind==='interior') blit('idoor',dx,dy,s,s); else blit('grass',dx,dy,s,s); return; }
  if(t==='E'||t==='A'){ blit('ifloor',dx,dy,s,s);
    const nm=t==='E'?'npc_elder':'npc_herb', sp=SPR[nm];
    if(sp) blitAnchor(nm,dx,dy,s,(sp.w/sp.h)*1.6,1.6); else if(s===16) npc(dx,dy,t==='E'?'elder':'herb');
    return; }
  if(s===16) drawTile(t,dx,dy,tk); else blit('grass',dx,dy,s,s); // cave/unknown
}
function drawHeroImg(dx,dy,dir,moving,s){
  let d='down', flip=false;
  if(dir==='up') d='up'; else if(dir==='down') d='down'; else { d='side'; flip=(dir==='left'); }
  const idx = moving ? [1,0,1,2][(S.tick>>3)%4] : 1;
  const sp=SPR['hero_'+d+'_'+idx]; if(!sp) return false;
  const h=1.7*s, w=h*(sp.w/sp.h), bx=dx-(w-s)/2, by=dy-(h-s);
  if(flip) blitFlip('hero_'+d+'_'+idx,bx,by,w,h); else blit('hero_'+d+'_'+idx,bx,by,w,h);
  return true;
}
const GOB={goblin:['goblin',1.0,1.15], sentry:['sentry',1.0,1.15], chief:['chief',1.6,1.9]};
function drawGoblinImg(dx,dy,s,type){ const d=GOB[type]||GOB.goblin; blitAnchor(d[0],dx,dy,s,d[1],d[2]); }
function drawHouses(cx,cy,s){ if(!S.map.houseRects||!SPR.house) return;
  for(const r of S.map.houseRects){ const w=(r.w+0.4)*s, h=w*(SPR.house.h/SPR.house.w);
    const dx=r.x*s-cx-(w-r.w*s)/2, dy=(r.y+r.h)*s-cy-h+0.4*s; blit('house',dx,dy,w,h); }
}

// ---------- palette helpers ----------
function px(x,y,w,h,c){ g.fillStyle=c; g.fillRect(x|0,y|0,w|0,h|0); }

// ---------- tiles ----------
// tile chars: , grass  = path  T tree  w water  # wall  ^ roof  d door(warp)
//  O well  K lookout  E elder  A herbwoman  H shrine  G gate
//  . caveFloor  x caveWall  < caveExit  i torch   F house floor  % house wall
const BLOCK = new Set(['T','w','#','^','d','x',' ','O','K','H','G_off','%']);
// tiles you cannot stand on (props/scenery). event tiles are blocked but interactable.
const EVENT = new Set(['O','K','E','A','H','G']);
const key=(x,y)=>x+','+y;

function drawTile(t,x,y,tk){
  switch(t){
    case ',': grass(x,y); break;
    case '"': grass(x,y); flower(x,y,'#f04a6a'); break;
    case '=': path(x,y); break;
    case 'T': grass(x,y); tree(x,y); break;
    case 'w': water(x,y,tk); break;
    case '#': wall(x,y); break;
    case '^': roof(x,y); break;
    case 'd': door(x,y); break;
    case 'H': grass(x,y); shrine(x,y); break;
    case 'O': grass(x,y); well(x,y); break;
    case 'K': grass(x,y); tower(x,y); break;
    case 'G': path(x,y); gate(x,y); break;
    case 'E': ifloor(x,y); npc(x,y,'elder'); break;
    case 'A': ifloor(x,y); npc(x,y,'herb'); break;
    case 'F': ifloor(x,y); break;
    case '%': iwall(x,y); break;
    case '.': cfloor(x,y); break;
    case 'x': cwall(x,y); break;
    case '<': cfloor(x,y); stairs(x,y); break;
    case 'i': cwall(x,y); torch(x,y,tk); break;
    default: grass(x,y);
  }
}
function grass(x,y){ px(x,y,16,16,'#4c9a3a'); px(x,y,16,16,'#4c9a3a');
  g.fillStyle='#3f8531'; g.fillRect(x+2,y+3,2,1); g.fillRect(x+9,y+6,2,1); g.fillRect(x+5,y+11,2,1); g.fillRect(x+12,y+13,2,1);
  g.fillStyle='#57ab45'; g.fillRect(x+7,y+2,1,1); g.fillRect(x+13,y+9,1,1); g.fillRect(x+3,y+14,1,1); }
function flower(x,y,c){ px(x+6,y+7,1,3,'#2f6b28'); px(x+5,y+6,3,1,c); px(x+6,y+5,1,3,c); px(x+6,y+7,1,1,'#fff'); }
function path(x,y){ px(x,y,16,16,'#c9a86f'); g.fillStyle='#b8965c';
  g.fillRect(x+3,y+4,2,1); g.fillRect(x+10,y+2,1,2); g.fillRect(x+6,y+10,2,1); g.fillRect(x+12,y+12,1,1); g.fillRect(x+1,y+9,1,1); }
function tree(x,y){ px(x+6,y+10,4,6,'#6b3f1f'); px(x+2,y+1,12,11,'#256a24');
  px(x+1,y+3,14,7,'#2c7a2a'); g.fillStyle='#3a9636'; g.fillRect(x+4,y+3,3,2); g.fillRect(x+9,y+6,3,2);
  g.fillStyle='#1c531b'; g.fillRect(x+2,y+9,12,2); }
function water(x,y,tk){ px(x,y,16,16,'#3a6ad0'); g.fillStyle='#5a86e6';
  const o=(tk>>3)%2?0:8; g.fillRect(x+o,y+4,5,1); g.fillRect(x+8-o,y+9,5,1); g.fillRect(x+o+2,y+13,4,1); }
function wall(x,y){ px(x,y,16,16,'#b06a3a'); g.fillStyle='#8f5028';
  for(let r=0;r<16;r+=4){ g.fillRect(x,y+r,16,1); const off=(r/4)%2?4:0; for(let c=off;c<16;c+=8) g.fillRect(x+c,y+r,1,4);} }
function roof(x,y){ px(x,y,16,16,'#a83028'); g.fillStyle='#7f221c';
  for(let r=2;r<16;r+=4) g.fillRect(x,y+r,16,1); g.fillStyle='#c24a40'; g.fillRect(x,y,16,2); }
function cfloor(x,y){ px(x,y,16,16,'#2f2a36'); g.fillStyle='#3a3444';
  g.fillRect(x+3,y+3,2,2); g.fillRect(x+10,y+8,2,1); g.fillRect(x+6,y+12,2,2); g.fillStyle='#262230'; g.fillRect(x+12,y+2,2,2); }
function cwall(x,y){ px(x,y,16,16,'#4a4450'); g.fillStyle='#3a3540';
  g.fillRect(x,y+5,16,2); g.fillRect(x,y+11,16,2); g.fillStyle='#585262'; g.fillRect(x+2,y+1,5,3); g.fillRect(x+9,y+7,5,3); }
function stairs(x,y){ px(x+2,y+2,12,12,'#1a1620'); g.fillStyle='#4a4450';
  for(let i=0;i<4;i++) g.fillRect(x+3,y+3+i*3,10-i*2,2); }

// ---------- characters (procedural sprites, 16x16) ----------
function drawHeroBody(x,y,dir,step,pal){
  const {hair,skin,tunic,tund,boot}=pal;
  const bob = step?1:0;
  const oy=y+bob;
  // boots (walk shift)
  const s=step?1:-1;
  px(x+4, oy+13, 3,3, boot); px(x+9, oy+13, 3,3, boot);
  if(dir==='left'||dir==='right'){ /* legs together-ish */ }
  // tunic
  px(x+3, oy+8, 10,6, tunic); px(x+3, oy+12, 10,1, tund);
  // arms
  px(x+2, oy+8, 2,4, skin); px(x+12, oy+8, 2,4, skin);
  // head
  px(x+4, oy+2, 8,7, skin);
  // hair
  if(dir==='up'){ px(x+3, oy+1, 10,6, hair); }
  else{ px(x+3, oy+1, 10,3, hair); px(x+3, oy+1, 2,5, hair); px(x+11, oy+1, 2,5, hair); }
  // eyes
  if(dir==='down'){ px(x+6, oy+5, 1,2, '#241a12'); px(x+9, oy+5, 1,2, '#241a12'); }
  else if(dir==='right'){ px(x+9, oy+5, 1,2, '#241a12'); }
  else if(dir==='left'){ px(x+6, oy+5, 1,2, '#241a12'); }
  // outline base
  px(x+3, oy+15, 10,1, '#1a140c');
}

// ---------- maps (built in code) ----------
function makeGrid(w,h,fill){ const a=[]; for(let y=0;y<h;y++){ a.push(new Array(w).fill(fill)); } return a; }
function rect(m,x,y,w,h,c){ for(let j=0;j<h;j++)for(let i=0;i<w;i++) if(m[y+j]&&m[y+j][x+i]!==undefined) m[y+j][x+i]=c; }
function hline(m,x,y,w,c){ for(let i=0;i<w;i++) if(m[y]&&m[y][x+i]!==undefined) m[y][x+i]=c; }
function vline(m,x,y,h,c){ for(let j=0;j<h;j++) if(m[y+j]&&m[y+j][x]!==undefined) m[y+j][x]=c; }

// place a house: w-wide, 2 roof rows + 1 wall row with a centered door. returns door {x,y}.
function house(m,x,y,w){ w=w||5;
  for(let r=0;r<2;r++) for(let i=0;i<w;i++) m[y+r][x+i]='^';
  for(let i=0;i<w;i++) m[y+2][x+i]='#';
  const dx=x+((w-1)>>1); m[y+2][dx]='d';
  return {x:dx, y:y+2};
}
function buildVillage(){
  const W=22,H=18, m=makeGrid(W,H,',');
  hline(m,0,0,W,'T'); hline(m,0,H-1,W,'T'); vline(m,0,0,H,'T'); vline(m,W-1,0,H,'T');
  // decorative trees (kept clear of roads/doors)
  m[2][2]='T'; m[15][3]='T'; m[16][19]='T'; m[2][19]='T';
  // roads
  hline(m,2,4,19,'=');    // top road (cols 2..20)
  vline(m,3,4,10,'=');    // left road
  vline(m,10,4,11,'=');   // central road
  hline(m,3,13,8,'=');    // lower-left road (elder side)
  vline(m,20,4,2,'=');    // spur down to the gate
  m[15][2]='"'; m[3][18]='"'; m[16][14]='"';
  // outdoor props (approach from south)
  m[3][9]='O';  m[4][9]='=';    // 井戸 well
  m[3][4]='K';  m[4][4]='=';    // 物見櫓 lookout
  m[12][10]='H'; m[13][10]='='; // 祠 shrine (south-center)
  // houses with interiors (door = warp)
  const eDoor = house(m,2,7,5);   // 村長の家 (west) -> door (4,9)
  const hDoor = house(m,14,7,5);  // 薬草小屋 (east) -> door (16,9)
  m[eDoor.y+1][eDoor.x]='=';       // footing in front of each door
  m[hDoor.y+1][hDoor.x]='=';
  const houseRects=[{x:2,y:7,w:5,h:3},{x:14,y:7,w:5,h:3}];
  const houseSet=new Set();
  for(const r of houseRects) for(let yy=r.y;yy<r.y+r.h;yy++) for(let xx=r.x;xx<r.x+r.w;xx++) houseSet.add(xx+','+yy);
  vline(m,16,10,3,'=');            // short path from the herb-hut door
  // gate to forest (east edge, reached from the top road)
  m[5][W-1]='G'; m[5][W-2]='=';
  const warps={};
  warps[key(eDoor.x,eDoor.y)]={to:'elderHouse', ex:5, ey:7, dir:'up'};
  warps[key(hDoor.x,hDoor.y)]={to:'herbHouse',  ex:5, ey:7, dir:'up'};
  return {m,W,H,start:{x:10,y:14},startDir:'up',kind:'village', warps, houseRects, houseSet,
          doors:{elder:{x:eDoor.x,y:eDoor.y+1}, herb:{x:hDoor.x,y:hDoor.y+1}}};
}
// a small house interior with the NPC standing inside
function buildInterior(kind){
  const W=11,H=9, m=makeGrid(W,H,'F');
  hline(m,0,0,W,'%'); hline(m,0,H-1,W,'%'); vline(m,0,0,H,'%'); vline(m,W-1,0,H,'%');
  const dx=5; m[H-1][dx]='d';                 // exit door (bottom-center)
  m[2][5] = kind==='elder' ? 'E' : 'A';        // the NPC
  const props=[], block=new Set();
  const put=(name,x,y,wt,ht,walk,floor)=>{ props.push({name,x,y,wt,ht,floor:!!floor});
    if(!walk){ const cw=Math.ceil(wt),ch=Math.ceil(ht); for(let j=0;j<ch;j++)for(let i=0;i<cw;i++) block.add((x+i)+','+(y+j)); } };
  // keep the centre column (x=5) and the NPC tile clear so the player can reach both
  put('rug',6,4,2,2,true,true);
  if(kind==='elder'){
    put('shelf',1,1,1,1.4); put('shelf',2,1,1,1.4); put('table',3,1,1,1);
    put('bed',9,1,1,2); put('plant',9,6,1,1.2); put('barrel',1,6,1,1); put('chair',3,2,1,1);
  } else {
    put('shelf',1,1,1,1.4); put('shelf',2,1,1,1.4); put('shelf',3,1,1,1.4);
    put('cauldron',9,5,1,1); put('table',9,1,1,1); put('plant',1,6,1,1.2); put('barrel',9,6,1,1);
  }
  const warps={};
  warps[key(dx,H-1)] = {to:'village', house:kind};  // ex/ey resolved from village.doors
  return {m,W,H, start:{x:dx,y:H-2}, startDir:'up', kind:'interior', warps, house:kind, props, blockSet:block};
}
function buildCave(){
  const W=20,H=18, m=makeGrid(W,H,'x');
  // entrance room bottom
  rect(m,7,13,6,4,'.');
  m[16][9]='<'; m[16][10]='<';           // exit back to village
  // corridor up
  rect(m,9,7,3,7,'.');
  // mid room
  rect(m,4,4,12,4,'.');
  // boss corridor & room top
  rect(m,8,1,5,4,'.');
  // torches on walls
  m[13][6]='i'; m[7][3]='i'; m[7][16]='i'; m[1][7]='i'; m[1][13]='i';
  // guards sit in the 3-wide vertical corridor so they cannot be walked around
  // without passing within 1 tile (= a stealth check). chief is the goal (no sneak).
  return {m,W,H,start:{x:9,y:15},startDir:'up',kind:'cave',
    enemies:[
      {x:10,y:12,type:'sentry',foes:[E('sentry')],alive:true,bypassed:false,detected:false},
      {x:10,y:8, type:'goblin',foes:[E('goblin'),E('goblin')],alive:true,bypassed:false,detected:false},
      {x:10,y:2, type:'chief', foes:[E('chief'),E('goblin')],alive:true,boss:true,bypassed:false,detected:false},
    ]};
}

// enemy factory (scenario stats)
function E(k){
  const D={ sentry:{name:'見張りゴブリン',hp:5,atk:0,dmg:[1,2],target:6,v:'sentry'},
            goblin:{name:'ゴブリン',hp:5,atk:0,dmg:[1,2],target:6,v:'goblin'},

// ---------- game state ----------
const S={
  scene:'title',           // title|map|dialogue|battle|win|over
  map:null, cam:{x:0,y:0},
  player:{x:0,y:0,dir:'down',moving:false,fx:0,fy:0,tx:0,ty:0,anim:0},
  // party
  hp:20,hpMax:20,mp:10,mpMax:10,herbs:0,
  bonus:{ hitAll:0, hitChief:0, physDmg:0, recon:false },
  prep:0, prepMax:3, visited:new Set(),
  tick:0,
  lod:0,           // map detail level (0 = default). zoom-in near the well -> 1
  reconUsed:false,
};
function resetParty(){ S.hp=20;S.mp=10;S.herbs=0;S.bonus={hitAll:0,hitChief:0,physDmg:0,recon:false};S.prep=0;S.visited=new Set(); }

function loadMap(mk){ loadMapAt(mk, mk.start.x, mk.start.y, mk.startDir); }
function loadMapAt(mk,ex,ey,dir){ S.map=mk; const p=S.player; S.lod=0;
  p.x=ex; p.y=ey; p.dir=dir||'down'; p.moving=false; p.tx=ex;p.ty=ey; p.fx=ex*TILE;p.fy=ey*TILE;
  S.scene='map'; centerCam(true); }

// ----- zoom / level-of-detail (well vicinity only, for now) -----
const MAXLOD=2, WELLR=3;            // detail levels 0..2 ; well zone radius (tiles)
function inVillage(){ return S.map && S.map.kind==='village'; }
function nearWell(){ return inVillage() &&
  Math.abs(S.player.x-WELL.x)<=WELLR && Math.abs(S.player.y-WELL.y)<=WELLR; }
function lodTpx(){ return S.lod>=2 ? 64 : (S.lod===1 ? 32 : 16); }
function zoomCam(tpx){ const p=S.player, mw=S.map.W*tpx, mh=S.map.H*tpx;
  let cx=(p.fx/16*tpx)+tpx/2-128, cy=(p.fy/16*tpx)+tpx/2-112;
  cx = mw<=256 ? -Math.floor((256-mw)/2) : Math.max(0,Math.min(cx,mw-256));
  cy = mh<=224 ? -Math.floor((224-mh)/2) : Math.max(0,Math.min(cy,mh-224));
  return {cx,cy}; }
function zoomIn(){ if(S.scene!=='map'||!inVillage()) return; if(S.lod>=MAXLOD) return; if(!nearWell()) return;
  S.lod++; updateZoomUI(); }
function zoomOut(){ if(S.lod>0){ S.lod--; updateZoomUI(); } }
function checkLodExit(){ // moving out of the well zone drops detail back to 0
  if(S.lod>0 && !nearWell()){ S.lod=0; updateZoomUI(); }
}
function centerCam(snap){ const p=S.player, mw=S.map.W*TILE, mh=S.map.H*TILE;
  let cx,cy;
  if(mw<=VW*TILE) cx=-Math.floor((VW*TILE-mw)/2);
  else { cx=p.fx+8-VW*TILE/2; cx=Math.max(0,Math.min(cx,mw-VW*TILE)); }
  if(mh<=VH*TILE) cy=-Math.floor((VH*TILE-mh)/2);
  else { cy=p.fy+8-VH*TILE/2; cy=Math.max(0,Math.min(cy,mh-VH*TILE)); }
  S.cam.x=cx; S.cam.y=cy; }

// warp between village and house interiors
function doWarp(w){
  if(w.to==='village'){
    const d = VILLAGE.doors[w.house]; // stand just in front of the house door
    loadMapAt(VILLAGE, d.x, d.y, 'down'); showPrep();
  } else {
    const mk = w.to==='elderHouse'?ELDER_HOUSE:HERB_HOUSE;
    loadMapAt(mk, w.ex, w.ey, w.dir); showPrep();
  }
}

function tileAt(x,y){ const m=S.map.m; if(y<0||x<0||y>=S.map.H||x>=S.map.W) return 'T'; return m[y][x]; }
function blocked(x,y){
  if(S.map.warps && S.map.warps[key(x,y)]) return false; // doorways are walkable
  if(S.map.blockSet && S.map.blockSet.has(key(x,y))) return true; // furniture
  const t=tileAt(x,y); if(BLOCK.has(t)||EVENT.has(t)) return true;
  // enemies block (unless already slipped past)
  if(S.map.enemies) for(const e of S.map.enemies) if(e.alive&&!e.bypassed&&e.x===x&&e.y===y) return true;
  return false; }

// ---------- rendering ----------
function draw(){
  g.fillStyle='#000'; g.fillRect(0,0,256,224);
  if(S.scene==='battle'){ drawBattle(); return; }
  if(!S.map) return;
  const p=S.player;
  if(S.lod>0){
    // ---- zoomed, high-detail (camera follows player) ----
    const tpx=lodTpx(), {cx,cy}=zoomCam(tpx);
    const cols=Math.ceil(256/tpx)+2, rows=Math.ceil(224/tpx)+2;
    const x0=Math.floor(cx/tpx), y0=Math.floor(cy/tpx);
    const hi2 = S.lod>=2;
    for(let j=-1;j<rows;j++) for(let i=-1;i<cols;i++){
      const tx=x0+i, ty=y0+j; if(tx<0||ty<0||tx>=S.map.W||ty>=S.map.H) continue;
      const sx=tx*tpx-cx, sy=ty*tpx-cy; const t=S.map.m[ty][tx];
      if(ASSETS.ready) drawTileImg(t,sx,sy,tpx,S.tick,tx,ty);
      else if(hi2) drawTileHi2(t,sx,sy,S.tick); else drawTileHi(t,sx,sy,S.tick);
    }
    const psx=Math.round(p.fx/16*tpx)-cx, psy=Math.round(p.fy/16*tpx)-cy, fr=p.moving?((S.tick>>3)%2):0;
    if(ASSETS.ready){ if(!drawHeroImg(psx,psy,p.dir,p.moving,tpx)){ if(hi2) drawHeroHi2(psx,psy,p.dir,fr); else drawHeroHi(psx,psy,p.dir,fr); } }
    else if(hi2) drawHeroHi2(psx,psy,p.dir,fr); else drawHeroHi(psx,psy,p.dir,fr);
    return;
  }
  // ---- LOD 0 : default simple renderer ----
  const cx=Math.round(S.cam.x), cy=Math.round(S.cam.y);
  const x0=Math.floor(cx/TILE), y0=Math.floor(cy/TILE);
  for(let j=-1;j<=VH+1;j++) for(let i=-1;i<=VW+1;i++){
    const tx=x0+i, ty=y0+j; if(tx<0||ty<0||tx>=S.map.W||ty>=S.map.H) continue;
    const t=S.map.m[ty][tx], dx=tx*TILE-cx, dy=ty*TILE-cy;
    if(ASSETS.ready) drawTileImg(t,dx,dy,TILE,S.tick,tx,ty); else drawTile(t,dx,dy,S.tick);
  }
  if(ASSETS.ready && S.map.houseRects) drawHouses(cx,cy,TILE);
  if(ASSETS.ready && S.map.props) for(const pr of S.map.props){
    if(pr.floor) blit(pr.name, pr.x*TILE-cx, pr.y*TILE-cy, pr.wt*TILE, pr.ht*TILE);
    else blitAnchor(pr.name, pr.x*TILE-cx, pr.y*TILE-cy, TILE, pr.wt, pr.ht);
  }
  // enemies on cave map
  if(S.map.enemies) for(const e of S.map.enemies){ if(!e.alive) continue;
    if(e.bypassed) g.globalAlpha=0.35;
    if(ASSETS.ready) drawGoblinImg(e.x*TILE-cx, e.y*TILE-cy, TILE, e.type);
    else drawGoblin(e.x*TILE-cx, e.y*TILE-cy, (S.tick>>4)%2, e.type);
    g.globalAlpha=1; }
  // player
  if(ASSETS.ready){ if(!drawHeroImg(Math.round(p.fx)-cx, Math.round(p.fy)-cy, p.dir, p.moving, TILE))
      drawHeroBody(Math.round(p.fx)-cx, Math.round(p.fy)-cy, p.dir, p.moving?((S.tick>>3)%2):0, HERO_PAL); }
  else drawHeroBody(Math.round(p.fx)-cx, Math.round(p.fy)-cy, p.dir, p.moving?((S.tick>>3)%2):0, HERO_PAL);
}

// ---------- battle rendering ----------
let B=null; // battle object
function drawBattle(){
  // background
  g.fillStyle='#181420'; g.fillRect(0,0,256,224);
  for(let i=0;i<40;i++){ g.fillStyle=i%2?'#221c2c':'#1c1726'; g.fillRect((i*37)%256,(i*53)%150,6,6);}
  g.fillStyle='#0e0b14'; g.fillRect(0,150,256,74);
  // enemies
  if(B){ const n=B.foes.length;
    B.foes.forEach((f,idx)=>{
      if(!f.alive) return;
      const cxp = 128 - (n*48)/2 + idx*48 + 24;   // centre of this foe slot
      if(ASSETS.ready){
        const s = f.v==='chief'?52:38;             // draw size in px
        drawGoblinImg(cxp - s/2, 96 - s, s, f.v);
      } else {
        const bx=cxp-8-(f.v==='chief'?8:0), by=60-(f.v==='chief'?14:0), sc=f.v==='chief'?2:1.4;
        g.save(); g.translate(bx,by); g.scale(sc,sc); drawGoblin(0,0,(S.tick>>4)%2, f.v); g.restore();
      }
    });
  }
}

// ---------- movement ----------
const DIRV={up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
function tryMove(dir){ const p=S.player; if(p.moving) return; p.dir=dir;
  const [dx,dy]=DIRV[dir]; const nx=p.x+dx, ny=p.y+dy;
  if(blocked(nx,ny)){ // walking into a guard -> engage in melee
    if(S.map.enemies) for(const e of S.map.enemies) if(e.alive&&!e.bypassed&&e.x===nx&&e.y===ny){ startBattle(e); return; }
    return; }
  p.moving=true; p.tx=nx; p.ty=ny; }
function updateMove(){ const p=S.player; if(!p.moving) return;
  const spd=2; const gx=p.tx*TILE, gy=p.ty*TILE;
  if(p.fx<gx) p.fx=Math.min(gx,p.fx+spd); else if(p.fx>gx) p.fx=Math.max(gx,p.fx-spd);
  if(p.fy<gy) p.fy=Math.min(gy,p.fy+spd); else if(p.fy>gy) p.fy=Math.max(gy,p.fy-spd);
  if(p.fx===gx&&p.fy===gy){ p.x=p.tx; p.y=p.ty; p.moving=false; onStep(); }
  centerCam(false);
}
function onStep(){
  if(S.lod>0) checkLodExit();   // leaving the well window drops detail back to 0
  // doorway warps (house entrances / exits)
  if(S.map.warps){ const w=S.map.warps[key(S.player.x,S.player.y)]; if(w){ doWarp(w); return; } }
  const t=tileAt(S.player.x,S.player.y);
  if(t==='<'){ // cave exit -> village
    loadMap(VILLAGE); hidePrep(false); showPrep(); return; }
  // guard detection: entering a tile adjacent (incl. diagonal) to an alert guard
  if(S.map.enemies){ const p=S.player;
    for(const e of S.map.enemies){
      if(!e.alive||e.bypassed||e.boss){ continue; }
      const adj = Math.max(Math.abs(e.x-p.x),Math.abs(e.y-p.y))<=1;
      if(adj && !e.detected){ e.detected=true; encounterChoice(e); return; }
      if(!adj){ e.detected=false; }
    }
  }
}

// ---------- interaction ----------
function interact(){
  if(S.scene==='dialogue'){ advanceDialogue(); return; }
  if(S.scene!=='map') return;
  const p=S.player, [dx,dy]=DIRV[p.dir]; const tx=p.x+dx, ty=p.y+dy;
  if(S.map.warps){ const w=S.map.warps[key(tx,ty)]; if(w){ doWarp(w); return; } }
  const t=tileAt(tx,ty);
  switch(t){
    case 'E': eventPrep('elder','村長','村長は囲炉裏の灰を掻いた。「頭目は右へ躱す。左を突け」——頭目への一手が刻まれた。',()=>{S.bonus.hitChief+=2;}); break;
    case 'A': eventPrep('herb','薬草の女','「傷が深くなったら噛みなさい。苦いが、閉じる」薬草を2つ受け取った。',()=>{S.herbs+=2;}); break;
    case 'H': eventPrep('shrine','古い祠','苔むした祠に手を合わせる。指先が落ち着き、狙いがぶれにくくなった。（全命中+1）',()=>{S.bonus.hitAll+=1;}); break;
    case 'O': eventPrep('well','古井戸','涸れた井戸の底に錆びた短剣が沈んでいた。素手より深く届く。（物理+2）',()=>{S.bonus.physDmg+=2;}); break;
    case 'K': eventPrep('lookout','物見櫓','森の抜け道と見張りの位置を覚えた。最初の一撃は外さない。（初撃必中／藪自動）',()=>{S.bonus.recon=true;}); break;
    case 'G': forestGate(); break;
  }
}
function eventPrep(key,name,text,apply){
  if(S.visited.has(key)){ dialogue(name,'……もう十分に話を聞いた。'); return; }
  if(S.prep>=S.prepMax){ dialogue(name,'（準備は3つまで。森へ向かおう。）'); return; }
  S.visited.add(key); S.prep++; apply(); updatePrep();
  dialogue(name,text);
}
function forestGate(){
  if(S.prep<1){ dialogue('','（まだ準備が足りない。村で情報や道具を集めよう。）'); return; }
  dialogue('','村の柵を抜けると、森の道が二手に分かれていた。街道と、棘の藪。',[
    {label:'街道を行く', go:()=>enterCave('road')},
    {label:'藪を抜ける【vit判定 目標8】', go:()=>bushCheck()},
  ]);
}
function bushCheck(){
  if(S.bonus.recon){ dialogue('','偵察の記憶が藪の抜け道へ導く。誰にも見咎められず、洞窟の入口へ。（自動成功）',[{label:'洞窟へ',go:()=>enterCave('sneak')}]); return; }
  const d=[d6(),d6()], sum=d[0]+d[1], mod=1 /*vit9*/, tot=sum+mod, ok=(sum===12)||(sum!==2&&tot>=8);
  const msg = ok? `藪を縫って見張りの目を掠めた。（2D6+1=${sum}+1=${tot} 成功）` : `藪で足を取られ枝が鳴った——が物陰へ滑り込む。露見はしていない。（${tot} 失敗）`;
  dialogue('',msg,[{label:'洞窟へ',go:()=>enterCave(ok?'sneak':'road')}]);
}
function enterCave(route){ hidePrep(true); loadMap(CAVE); S.scene='map'; }

// ---------- cave guards: TRPG-style avoid-or-fight ----------
function foeLabel(e){ const n=e.foes.length; return e.foes[0].name+(n>1?` ×${n}`:''); }
function encounterChoice(e){
  const rec = S.bonus.recon?'（偵察 +2）':'';
  dialogue('！ 気配', `${foeLabel(e)} が こちらの気配を探っている。`, [
    {label:'たたかう', go:()=>startBattle(e)},
    {label:`しのび足で回避【vit判定 目標8】${rec}`, go:()=>caveSneak(e)},
  ]);
}
function caveSneak(e){
  const rec = S.bonus.recon?2:0, mod = (HERO_VIT-8)+rec; // vit9 -> +1 (+recon)
  const dc=[d6(),d6()], sum=dc[0]+dc[1], tot=sum+mod;
  const ok = (sum===12) || (sum!==2 && tot>=8);
  animateDice(dc, ()=>{
    const line = `2D6${mod>=0?'+':''}${mod} = ${sum}${mod>=0?'+':''}${mod} = ${tot}（目標8）`;
    if(ok){
      dialogue('しのび足・成功', `息をひそめ、${foeLabel(e)} の脇をすり抜けた。 ${line}`, [
        {label:'先へ進む', go:()=>{ hideDice(); e.bypassed=true; }},
      ]);
    } else {
      dialogue('しのび足・失敗', `足音を聞かれた！ ${foeLabel(e)} がこちらへ向き直る。 ${line}`, [
        {label:'戦う', go:()=>{ hideDice(); startBattle(e); }},
      ]);
    }
  });
}

// ---------- dialogue system ----------
let dlgQ=null;
function dialogue(name,text,choices){
  S.scene='dialogue'; dlgQ={name,text,choices,typed:0,done:false};
  const el=document.getElementById('dlg'); el.style.display='block';
  document.getElementById('dName').textContent=name||'';
  document.getElementById('dName').style.display=name?'block':'none';
  document.getElementById('dText').textContent='';
  document.getElementById('choices').style.display='none';
}
function typeDialogue(){
  if(!dlgQ||dlgQ.done) return;
  if(S.tick%1===0 && dlgQ.typed<dlgQ.text.length){ dlgQ.typed+=1;
    document.getElementById('dText').textContent=dlgQ.text.slice(0,dlgQ.typed);
    if(dlgQ.typed>=dlgQ.text.length){ dlgQ.done=true; showChoices(); } }
}
function showChoices(){ if(!dlgQ||!dlgQ.choices) return;
  const el=document.getElementById('choices'); el.innerHTML=''; dlgQ.sel=0;
  dlgQ.choices.forEach((c,i)=>{ const d=document.createElement('div'); d.className='opt'+(i===0?' on':''); d.textContent=c.label;
    d.onclick=()=>{dlgQ.sel=i;renderChoices();chooseDialogue();}; el.appendChild(d); });
  el.style.display='block';
}
function renderChoices(){ const el=document.getElementById('choices'); [...el.children].forEach((c,i)=>c.className='opt'+(i===dlgQ.sel?' on':'')); }
function advanceDialogue(){
  if(!dlgQ) return;
  if(!dlgQ.done){ dlgQ.typed=dlgQ.text.length; document.getElementById('dText').textContent=dlgQ.text; dlgQ.done=true; showChoices(); return; }
  if(dlgQ.choices){ chooseDialogue(); return; }
  closeDialogue();
}
function chooseDialogue(){ const c=dlgQ.choices[dlgQ.sel]; closeDialogue(); c.go&&c.go(); }
function closeDialogue(){ document.getElementById('dlg').style.display='none';
  document.getElementById('choices').style.display='none'; dlgQ=null; if(S.scene==='dialogue') S.scene='map'; }

// ---------- dice / RNG ----------
function d6(){ return 1+Math.floor(Math.random()*6); }
function modOf(v){ return v-8; }
const HERO_STR=8,HERO_MAG=8,HERO_VIT=9;

// ---------- battle ----------
function startBattle(mapEnemy){
  S.scene='battle';
  B={ src:mapEnemy, foes:mapEnemy.foes.map(f=>({...f,alive:true,hp:f.hp,hpMax:f.hpMax})),
      state:'menu', sel:0, tsel:0, msgQ:[], onMsgEnd:null };
  hideAll(); document.getElementById('bStatus').style.display='block';
  document.getElementById('foes').style.display='block'; renderFoes();
  showMenu(); renderStatus();
}
function renderFoes(){
  const c=document.getElementById('foes'); c.innerHTML=''; const n=B.foes.length;
  B.foes.forEach((f,idx)=>{
    let cx, top;
    if(ASSETS.ready){ const s=f.v==='chief'?52:38; cx=128-(n*48)/2+idx*48+24; top=(96-s-14); }
    else { const sc=f.v==='chief'?2:1.4; cx=128-(n*40)/2+idx*40+4+8*sc; top=(60-(f.v==='chief'?14:0))-12; }
    const cxp=cx/256*100, typ=top/224*100;
    const d=document.createElement('div'); d.className='foe'; d.dataset.i=idx;
    d.style.left=cxp+'%'; d.style.top=typ+'%';
    d.innerHTML=`<div class="fn">${f.name}</div><div class="fbar"><i></i></div><div class="fhp"></div>`;
    c.appendChild(d);
  });
  updateFoes();
}
function updateFoes(){
  const c=document.getElementById('foes'); if(!B) return;
  [...c.children].forEach(d=>{ const f=B.foes[+d.dataset.i]; const p=Math.max(0,f.hp/f.hpMax*100);
    d.querySelector('.fbar i').style.width=p+'%';
    d.querySelector('.fhp').textContent=`HP ${Math.max(0,f.hp)}/${f.hpMax}`;
    d.style.opacity=f.alive?1:0.2; });
}
const MENU=[{k:'attack',t:'たたかう'},{k:'magic',t:'まほう'},{k:'herb',t:'くすり'},{k:'flee',t:'にげる'}];
function menuEnabled(k){ if(k==='magic') return S.mp>=2; if(k==='herb') return S.herbs>0; return true; }
function showMenu(){ B.state='menu'; const el=document.getElementById('bMenu'); el.style.display='block';
  document.getElementById('bMsg').style.display='none'; document.getElementById('dice').style.display='none';
  B.sel=0; while(!menuEnabled(MENU[B.sel].k)&&B.sel<3) B.sel++;
  renderMenu();
}
function renderMenu(){ const el=document.getElementById('bMenu'); el.innerHTML='';
  MENU.forEach((m,i)=>{ const en=menuEnabled(m.k); const d=document.createElement('div');
    d.className='opt'+(i===B.sel?' on':'')+(en?'':' dis');
    let tail = m.k==='magic'?` <span style="color:#9ad">MP2</span>` : m.k==='herb'?` <span style="color:#9ad">×${S.herbs}</span>`:'';
    d.innerHTML=m.t+tail;
    d.onclick=()=>{ if(!en) return; B.sel=i; renderMenu(); chooseMenu(); };
    el.appendChild(d); });
}
function renderStatus(){ const el=document.getElementById('bStatus');
  const hpp=Math.max(0,S.hp/S.hpMax*100), mpp=Math.max(0,S.mp/S.mpMax*100);
  el.innerHTML = `<div class="cap">H（あなた）</div>`+
    `HP ${S.hp}/${S.hpMax}<div class="bar"><i style="width:${hpp}%;background:${hpp<30?'#e05050':'#40c040'}"></i></div>`+
    `MP ${S.mp}/${S.mpMax}<div class="bar"><i style="width:${mpp}%;background:#4080e0"></i></div>`+
    `くすり ×${S.herbs}`;
}
function chooseMenu(){ const k=MENU[B.sel].k;
  if(k==='flee'){ battleMsg(['……森の入口まで退いた。'], ()=>{ endBattle(false,true); }); return; }
  if(k==='herb'){ doHerb(); return; }
  // need target if >1 living foe
  const living=B.foes.filter(f=>f.alive);
  if((k==='attack'||k==='magic') && living.length>1){ startTarget(k); return; }
  const tgt=B.foes.findIndex(f=>f.alive);
  doAttack(k,tgt);
}
function startTarget(k){ B.state='target'; B.pendK=k; B.tsel=B.foes.findIndex(f=>f.alive);
  document.getElementById('bMenu').style.display='none';
  battleMsg(['どの敵を狙う？（←→で選択）'],null,true);
}
function renderTargetHint(){ /* handled visually by message; simple */ }
function confirmTarget(){ const k=B.pendK, t=B.tsel; document.getElementById('bMsg').style.display='none'; doAttack(k,t); }

function rollDice(mod,target){ const dc=[d6(),d6()]; const sum=dc[0]+dc[1]; const crit=sum===12,fumble=sum===2;
  const total=sum+mod; const success=crit||(!fumble&&total>=target); return {dc,sum,crit,fumble,total,success,mod,target}; }
function showDice(dc){ const wrap=document.getElementById('dice'); wrap.style.display='flex';
  [document.getElementById('d1'),document.getElementById('d2')].forEach((el,i)=>{ el.innerHTML=''; pips(el,dc[i]); }); }
function hideDice(){ const w=document.getElementById('dice'); w.style.display='none'; w.classList.remove('shake');
  document.getElementById('d1').classList.remove('roll'); document.getElementById('d2').classList.remove('roll'); }

// ---- rolling animation (works in any scene) ----
let ROLL=null;
function animateDice(final,onDone){
  const w=document.getElementById('dice'); w.style.display='flex'; w.classList.add('shake');
  document.getElementById('d1').classList.add('roll'); document.getElementById('d2').classList.add('roll');
  showDice([d6(),d6()]);
  ROLL={t:0, dur:24, settle:16, final, onDone};
}
function tickRoll(){
  if(!ROLL) return;
  ROLL.t++;
  if(ROLL.t<ROLL.dur){ if(ROLL.t%2===0) showDice([d6(),d6()]); }
  else if(ROLL.t===ROLL.dur){ showDice(ROLL.final);
    document.getElementById('dice').classList.remove('shake');
    document.getElementById('d1').classList.remove('roll'); document.getElementById('d2').classList.remove('roll'); }
  else if(ROLL.t>=ROLL.dur+ROLL.settle){ const cb=ROLL.onDone; ROLL=null; cb&&cb(); }
}
function pips(el,n){ const pos={ // 3x3 grid positions (percent)
    1:[[50,50]],2:[[25,25],[75,75]],3:[[25,25],[50,50],[75,75]],
    4:[[25,25],[75,25],[25,75],[75,75]],5:[[25,25],[75,25],[50,50],[25,75],[75,75]],
    6:[[25,22],[75,22],[25,50],[75,50],[25,78],[75,78]]}[n];
  pos.forEach(([x,y])=>{ const p=document.createElement('div'); p.className='p'; p.style.left=(x-9)+'%'; p.style.top=(y-9)+'%'; el.appendChild(p); }); }

function doAttack(kind,ti){
  document.getElementById('bMenu').style.display='none';
  const f=B.foes[ti];
  const isMagic=kind==='magic';
  if(isMagic) S.mp-=2;
  const base = isMagic?HERO_MAG:HERO_STR;
  let hitmod = modOf(base) + S.bonus.hitAll + (f.v==='chief'?S.bonus.hitChief:0);
  const r=rollDice(hitmod, f.target);
  const label = isMagic?'まほう':'こうげき';
  const rollLine = `H の${label}！ 2D6${hitmod>=0?'+':''}${hitmod} = ${r.sum}${hitmod>=0?'+':''}${hitmod} = ${r.total}（目標${f.target}）`;
  const msgs=[rollLine];
  let dmg=0, kill=false;
  if(r.fumble){ msgs.push('ファンブル！ 手元が狂い、攻撃は空を切った。'); }
  else if(r.success){
    dmg = isMagic ? d6()+3+modOf(HERO_MAG) : d6()+modOf(HERO_STR)+S.bonus.physDmg;
    dmg=Math.max(1,dmg); if(r.crit){ dmg*=2; msgs.push('会心の一撃！！'); }
    msgs.push(`${f.name}に ${dmg} のダメージ！`);
    kill = (f.hp-dmg)<=0;
    if(kill) msgs.push(`${f.name}を倒した！`);
  } else { msgs.push('攻撃は外れた。'); }
  // roll the dice, THEN apply the result on reveal
  animateDice(r.dc, ()=>{
    if(dmg){ f.hp-=dmg; if(kill) f.alive=false; updateFoes(); }
    battleMsg(msgs, ()=>{ hideDice(); afterPlayer(); });
  });
}
function doHerb(){ document.getElementById('bMenu').style.display='none';
  const heal=d6()+3; S.herbs-=1; S.hp=Math.min(S.hpMax,S.hp+heal); renderStatus();
  battleMsg([`薬草を噛んだ。HP が ${heal} 回復した。`,'（薬草を使ったこのターンも、敵は動く）'], ()=>afterPlayer());
}
function afterPlayer(){
  renderStatus();
  if(B.foes.every(f=>!f.alive)){ victory(); return; }
  enemyTurn();
}
function enemyTurn(){
  const acts=[]; const living=B.foes.filter(f=>f.alive);
  for(const f of living){
    const r=rollDice(f.atk,8);
    if(r.success){ const dmg=f.dmg[0]+Math.floor(Math.random()*(f.dmg[1]-f.dmg[0]+1));
      S.hp-=dmg; acts.push(`${f.name}の攻撃！ H は ${dmg} のダメージ！`);
      if(S.hp<=0){ S.hp=0; break; } }
    else acts.push(`${f.name}の攻撃！ H は かわした。`);
  }
  battleMsg(acts.length?acts:['敵はようすを見ている。'], ()=>{
    renderStatus();
    if(S.hp<=0){ defeat(); return; }
    showMenu();
  });
}
function victory(){ const boss=B.src.boss; B.src.alive=false;
  battleMsg(['敵をすべて倒した！'], ()=>{
    if(boss){ endBattle(true,false,true); } else { endBattle(true,false); }
  });
}
function defeat(){ battleMsg(['H は倒れた……'], ()=>{ endBattle(false,false,false,true); }); }

function endBattle(won,fled,bossWin,dead){
  hideBattleUI();
  if(dead){ resetPartyToVillage(); return; }
  if(bossWin){ S.scene='win'; document.getElementById('winSub').textContent='頭目は崩れ落ち、洞窟に静けさが戻った。'; show('win'); return; }
  // return to map
  S.scene='map';
  if(won){ // move player onto the (now cleared) enemy tile? just stay
  }
  if(fled){ /* stay in place */ }
}
function resetPartyToVillage(){
  // defeat: wake in village, half HP, MP full (per scenario)
  S.hp=Math.max(1,Math.floor(S.hpMax/2)); S.mp=S.mpMax;
  hideAll(); S.scene='over'; show('over');
}

// battle message queue
function battleMsg(list,done,keepTargetNav){
  B.msgQ=list.slice(); B.onMsgEnd=done; B.state=keepTargetNav?'target':'msg';
  const el=document.getElementById('bMsg'); el.style.display='block';
  nextMsg();
}
function nextMsg(){ if(!B.msgQ.length){ const cb=B.onMsgEnd; B.onMsgEnd=null;
    document.getElementById('bMsg').style.display='none'; cb&&cb(); return; }
  document.getElementById('bMsgT').textContent=B.msgQ.shift(); }

// ---------- input ----------
const keys={};
function onKey(k,down){
  if(down){ if(keys[k]) return; keys[k]=true; keyPress(k); } else keys[k]=false;
}
function keyPress(k){
  if(ROLL) return; // ignore input while dice are rolling
  if(S.scene==='title'){ if(k==='ok'){ startGame(); } return; }
  if(S.scene==='win'){ if(k==='ok'){ toTitle(); } return; }
  if(S.scene==='over'){ if(k==='ok'){ resetParty(); startGame(); } return; }
  if(S.scene==='dialogue'){
    if(dlgQ&&dlgQ.choices&&dlgQ.done){
      if(k==='up'){ dlgQ.sel=(dlgQ.sel-1+dlgQ.choices.length)%dlgQ.choices.length; renderChoices(); return; }
      if(k==='down'){ dlgQ.sel=(dlgQ.sel+1)%dlgQ.choices.length; renderChoices(); return; }
    }
    if(k==='ok') advanceDialogue();
    return;
  }
  if(S.scene==='battle'){ battleKey(k); return; }
  if(S.scene==='map'){
    if(k==='zoomin'){ zoomIn(); return; }
    if(k==='zoomout'){ zoomOut(); return; }
    if(k==='ok'){ interact(); return; }
    if(['up','down','left','right'].includes(k)) tryMove(k);
  }
}
function battleKey(k){
  if(!B) return;
  if(B.state==='menu'){
    if(k==='up'){ do{B.sel=(B.sel-1+4)%4;}while(!menuEnabled(MENU[B.sel].k)); renderMenu(); }
    else if(k==='down'){ do{B.sel=(B.sel+1)%4;}while(!menuEnabled(MENU[B.sel].k)); renderMenu(); }
    else if(k==='ok'){ chooseMenu(); }
  } else if(B.state==='target'){
    const living=B.foes.map((f,i)=>i).filter(i=>B.foes[i].alive);
    if(k==='left'||k==='up'){ let p=living.indexOf(B.tsel); B.tsel=living[(p-1+living.length)%living.length]; document.getElementById('bMsgT').textContent=`▶ ${B.foes[B.tsel].name} を狙う`; }
    else if(k==='right'||k==='down'){ let p=living.indexOf(B.tsel); B.tsel=living[(p+1)%living.length]; document.getElementById('bMsgT').textContent=`▶ ${B.foes[B.tsel].name} を狙う`; }
    else if(k==='ok'){ confirmTarget(); }
    else if(k==='cancel'){ document.getElementById('bMsg').style.display='none'; showMenu(); }
  } else if(B.state==='msg'){
    if(k==='ok') nextMsg();
  }
}

// ---------- ui helpers ----------
function hideAll(){ ['dlg','choices','bStatus','bMenu','bMsg','dice','prep','foes'].forEach(id=>document.getElementById(id).style.display='none'); }
function hideBattleUI(){ ['bStatus','bMenu','bMsg','dice','foes'].forEach(id=>document.getElementById(id).style.display='none'); }
function show(id){ document.getElementById(id).style.display='flex'; }
function hideFull(id){ document.getElementById(id).style.display='none'; }
function showPrep(){ document.getElementById('prep').style.display='block'; updatePrep(); }
function hidePrep(x){ document.getElementById('prep').style.display='none'; }
function updatePrep(){ document.getElementById('prepN').textContent=`${S.prep}/${S.prepMax}`; }
let _zsig='', _uiHi=null;
function applyUiDetail(hi){
  if(hi===_uiHi) return; _uiHi=hi;
  document.getElementById('screen').classList.toggle('hi', hi);
  document.getElementById('prepLbl').textContent = hi?'準備':'じゅんび';
  document.getElementById('zlvlLbl').textContent = hi?'詳細度':'しょうさいど';
  document.getElementById('zoomIn').textContent  = hi?'＋ 拡大':'＋ ズームイン';
  document.getElementById('zoomOut').textContent = hi?'－ 縮小':'－ ズームアウト';
}
function updateZoomUI(){
  applyUiDetail(S.lod>0);   // player/menu detail follows the map detail level
  const z=document.getElementById('zoom');
  const showZoom = S.scene==='map' && inVillage();
  z.style.display = showZoom ? 'flex' : 'none';
  if(!showZoom){ _zsig=''; return; }
  const canIn = S.lod<MAXLOD && nearWell();
  const canOut = S.lod>0;
  const sig = `${S.lod}|${canIn}|${canOut}`;
  if(sig===_zsig) return; _zsig=sig;
  document.getElementById('zlvlN').textContent = '+'+S.lod;
  document.getElementById('zoomIn').disabled = !canIn;
  document.getElementById('zoomOut').disabled = !canOut;
}

function startGame(){ hideFull('title'); resetParty(); initMaps(); // fresh maps -> enemies respawn each run
  loadMap(VILLAGE); S.scene='map'; showPrep();
  dialogue('','洞窟のゴブリンが家畜を襲う。頭目を討ってくれ——。村で3つまで準備を整え、東の門から森へ。'); }
function toTitle(){ hideFull('win'); hideAll(); S.scene='title'; show('title'); }

// ---------- boot ----------
let VILLAGE,CAVE,ELDER_HOUSE,HERB_HOUSE;
function initMaps(){ VILLAGE=buildVillage(); CAVE=buildCave();
  ELDER_HOUSE=buildInterior('elder'); HERB_HOUSE=buildInterior('herb'); }

// keyboard
const KMAP={ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right',
  w:'up',s:'down',a:'left',d:'right',z:'ok',Z:'ok',Enter:'ok',' ':'ok',x:'cancel',X:'cancel',Escape:'cancel',
  '+':'zoomin','=':'zoomin',';':'zoomin','-':'zoomout',_:'zoomout'};
addEventListener('keydown',e=>{ const k=KMAP[e.key]; if(k){ e.preventDefault(); onKey(k,true);} });
addEventListener('keyup',e=>{ const k=KMAP[e.key]; if(k){ onKey(k,false);} });
// zoom buttons (independent of the game key queue)
document.getElementById('zoomIn').addEventListener('click', ()=>{ zoomIn(); });
document.getElementById('zoomOut').addEventListener('click', ()=>{ zoomOut(); });
// touch buttons
function bindTouch(){
  document.querySelectorAll('#pad .k,#btns .b').forEach(el=>{
    const k=el.dataset.k;
    const dn=e=>{e.preventDefault();onKey(k,true);}; const up=e=>{e.preventDefault();onKey(k,false);};
    el.addEventListener('touchstart',dn,{passive:false}); el.addEventListener('touchend',up,{passive:false});
    el.addEventListener('mousedown',dn); el.addEventListener('mouseup',up); el.addEventListener('mouseleave',up);
  });
  // show touch controls on touch devices
  if('ontouchstart' in window){ document.getElementById('pad').style.display='block'; document.getElementById('btns').style.display='flex'; }
}
// tap screen advances dialogue / confirms on title/end
document.getElementById('screen').addEventListener('click',e=>{
  if(e.target.closest('#pad')||e.target.closest('#btns')||e.target.closest('#zoom')||e.target.closest('.opt')) return;
  if(S.scene==='title'||S.scene==='win'||S.scene==='over'){ onKey('ok',true); onKey('ok',false); }
  else if(S.scene==='dialogue'||S.scene==='battle'){ onKey('ok',true); onKey('ok',false); }
});

// ---------- main loop ----------
function loop(){ S.tick++;
  tickRoll();
  if(S.scene==='map' && !ROLL){ updateMove();
    // hold-to-move
    if(!S.player.moving){ for(const d of ['up','down','left','right']) if(keys[d]){ tryMove(d); break; } }
  }
  if(S.scene==='dialogue') typeDialogue();
  updateZoomUI();
  draw();
  requestAnimationFrame(loop);
}

initMaps(); bindTouch(); show('title'); loop();
</script>
